version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: votesecure_app
    ports:
      - "5000:5000"
    volumes:
      - voting_data:/app/data
    environment:
      - FLASK_ENV=production
      - DATABASE_PATH=/app/data/voting.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  voting_data:
    driver: local
